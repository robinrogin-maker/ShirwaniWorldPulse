<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="underlineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="20%" style="stop-color:#00D9FF"/>
      <stop offset="50%" style="stop-color:#E94560"/>
      <stop offset="80%" style="stop-color:#00D9FF"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Pulse rings -->
  <circle cx="400" cy="160" r="140" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.25" filter="url(#neonGlow)"/>
  <circle cx="400" cy="160" r="140" fill="none" stroke="#00D9FF" stroke-width="0.5" opacity="0.15"/>
  <circle cx="400" cy="160" r="110" fill="none" stroke="#E94560" stroke-width="1" opacity="0.2" filter="url(#neonGlow)"/>

  <!-- ECG Line -->
  <polyline points="60,80 120,80 135,58 150,102 165,80 220,80 235,55 250,105 265,80 320,80 335,62 350,98 365,80 420,80 435,56 450,104 465,80 520,80 535,60 550,100 565,80 620,80 635,58 650,102 665,80 720,80 735,60 750,100 740,80"
    fill="none" stroke="#00D9FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" filter="url(#neonGlow)"/>

  <!-- Main brand name -->
  <text x="400" y="180" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="52" font-weight="800" letter-spacing="-1">
    <tspan fill="#f0f0f0" filter="url(#softGlow)">Shirwani</tspan><tspan fill="#a0a0a0">World</tspan><tspan fill="#f0f0f0" filter="url(#softGlow)">Pulse</tspan>
  </text>

  <!-- Underline -->
  <rect x="200" y="200" width="400" height="2" rx="1" fill="url(#underlineGrad)" opacity="0.7"/>

  <!-- Tagline - single RTL line, no separators, proper spacing -->
  <!-- Using text-anchor="middle" and individual x positions for precise RTL layout -->

  <!-- Part 3 (rightmost in visual): وكل ما يصنع يومك في مكان واحد -->
  <text x="400" y="240" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" fill="#a0a0a0" letter-spacing="0.5" direction="rtl">
    <tspan fill="#00D9FF" font-size="15" font-weight="700" letter-spacing="1">نبض العالم</tspan>
    <tspan dx="18"> </tspan>
    <tspan fill="#888" font-size="15" letter-spacing="1">بوضوح ومصداقية</tspan>
    <tspan dx="18"> </tspan>
    <tspan fill="#a0a0a0" font-size="13" letter-spacing="0.5">وكل ما يصنع يومك في مكان واحد</tspan>
  </text>

</svg>